services:
  # Backend API service
  backend:
    build:
      context: ./src/Backend
      dockerfile: Dockerfile
    container_name: pm-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/project.db
      - JwtSettings__Secret=${JWT_SECRET:-your-super-secret-key-at-least-32-characters-long}
      - JwtSettings__Issuer=ProjectManagementAPI
      - JwtSettings__Audience=ProjectManagementClient
      - JwtSettings__AccessTokenExpirationMinutes=60
      - JwtSettings__RefreshTokenExpirationDays=7
    volumes:
      # Use local database file
      - ./src/Backend/src/ProjectManagement.Api/projectmanagement.db:/app/projectmanagement.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - pm-network

  # Frontend web application
  frontend:
    build:
      context: ./src/Frontend
      dockerfile: Dockerfile
    container_name: pm-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      # API URL for production (used by nginx proxy)
      - VITE_API_URL=http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pm-network

volumes:
  # Persistent storage for database
  backend-data:
    driver: local

networks:
  # Shared network for inter-service communication
  pm-network:
    driver: bridge
